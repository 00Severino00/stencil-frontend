<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tattoo LineArt Studio Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .image-container { position: relative; width: 100%; max-width: 550px; height: 550px; background-color: white; }
        .image-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; z-index: 10; }
        
        /* Capa de fusión en pantalla para previsualizar el color en la web */
        #tintLayer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            mix-blend-mode: screen; pointer-events: none; display: none; z-index: 15; 
        }
    </style>
</head>
<body class="bg-gray-955 text-white min-h-screen flex flex-col items-center justify-center p-4 font-sans">

    <div class="w-full max-w-2xl bg-gray-900 p-8 rounded-2xl shadow-2xl text-center border border-gray-800">
        <h1 class="text-3xl font-black mb-1 text-yellow-400 uppercase tracking-wider">LineArt Studio Pro</h1>
        <p class="text-gray-400 text-xs mb-6 uppercase tracking-widest">Motor de Trazo Suave Estilo Estilógrafo</p>

        <div class="mb-6">
            <label class="block w-full border-2 border-dashed border-gray-700 hover:border-yellow-500 rounded-xl p-6 cursor-pointer transition bg-gray-950">
                <span class="text-sm text-gray-300 block mb-1 font-semibold">Seleccionar imagen o captura de pantalla</span>
                <span class="text-xs text-gray-500 block">Elimina automáticamente fondos oscuros y pixelados</span>
                <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="cargarImagen(event)">
            </label>
        </div>

        <div id="controlesPanel" class="mb-6 bg-gray-950 p-5 rounded-xl border border-gray-800 hidden text-left space-y-5">
            <div>
                <div class="flex justify-between text-xs font-bold text-gray-400 mb-1">
                    <span>MENOS DETALLE (Líneas Claras)</span>
                    <span class="text-yellow-400">TOLERANCIA / DETALLE: <span id="valTolerancia">25</span></span>
                    <span>MÁS DETALLE (Captar Todo)</span>
                </div>
                <input type="range" id="toleranceSlider" min="5" max="45" step="1" value="25" oninput="actualizarValoresUI()" onchange="procesarStencil()" class="w-full h-2 bg-gray-800 rounded-lg appearance-none cursor-pointer accent-yellow-400">
            </div>

            <div>
                <div class="flex justify-between text-xs font-bold text-gray-400 mb-1">
                    <span>FINO (Línea Aguja)</span>
                    <span class="text-yellow-400">GROSOR DEL TRAZO: <span id="valGrosor">2</span> px</span>
                    <span>GRUESO (Línea Sólida)</span>
                </div>
                <input type="range" id="thicknessSlider" min="1" max="5" step="1" value="2" oninput="actualizarValoresUI()" onchange="procesarStencil()" class="w-full h-2 bg-gray-800 rounded-lg appearance-none cursor-pointer accent-yellow-400">
            </div>
        </div>

        <button id="btnProcesar" onclick="procesarStencil()" class="w-full bg-yellow-500 hover:bg-yellow-600 text-gray-950 font-black py-3.5 px-6 rounded-xl transition hidden shadow-lg uppercase text-sm tracking-wider">
            Generar Lineart de Precisión 🖋️
        </button>

        <p id="txtCargando" class="text-yellow-400 text-sm font-medium hidden animate-pulse py-2">Dibujando curvas y aplicando suavizado anti-aliasing vectorial...</p>

        <div id="editorArea" class="mt-6 hidden text-left space-y-4">
            <div class="text-center">
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2 tracking-wider">Color del Calco (Tinta)</label>
                <div class="flex gap-4 justify-center">
                    <button onclick="cambiarColor('black')" class="w-8 h-8 rounded-full bg-black border-2 border-white cursor-pointer shadow-md transform hover:scale-110 transition"></button>
                    <button onclick="cambiarColor('red')" class="w-8 h-8 rounded-full bg-red-600 border border-transparent cursor-pointer shadow-md transform hover:scale-110 transition"></button>
                    <button onclick="cambiarColor('blue')" class="w-8 h-8 rounded-full bg-blue-600 border border-transparent cursor-pointer shadow-md transform hover:scale-110 transition"></button>
                    <button onclick="cambiarColor('green')" class="w-8 h-8 rounded-full bg-green-500 border border-transparent cursor-pointer shadow-md transform hover:scale-110 transition"></button>
                </div>
            </div>

            <div class="image-container mx-auto border border-gray-800 rounded-xl overflow-hidden shadow-2xl bg-white">
                <img id="imgStencil" class="image-layer" alt="Lineart Suave">
                <div id="tintLayer"></div>
                <img id="imgOriginal" class="image-layer" alt="Original" style="z-index: 20; opacity: 0;">
            </div>

            <div class="bg-gray-950 p-4 rounded-xl border border-gray-800">
                <label class="block text-xs text-gray-400 mb-1 font-bold uppercase tracking-wider">Deslizador de Comparación (Original vs Calco)</label>
                <input type="range" id="opacitySlider" min="0" max="100" value="0" oninput="cambiarOpacidad(this.value)" class="w-full h-1 bg-gray-800 rounded-lg appearance-none cursor-pointer accent-gray-400">
            </div>

            <button onclick="descargarJPG()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3.5 px-6 rounded-xl transition shadow-lg uppercase text-sm tracking-wider">
                Descargar Plantilla Limpia (JPG)
            </button>
        </div>
    </div>

    <script>
        // REEMPLAZA ESTA URL CON TU URL REAL DE RENDER CUANDO LA SUBAS
        const URL_API = "https://stencil-backend-youx.onrender.com/generate-stencil/";
        let archivoOriginal = null;
        let colorActual = 'black';

        function cargarImagen(event) {
            const file = event.target.files[0];
            if (file) {
                archivoOriginal = file;
                document.getElementById('imgOriginal').src = URL.createObjectURL(file);
                document.getElementById('btnProcesar').classList.remove('hidden');
                document.getElementById('controlesPanel').classList.remove('hidden');
                document.getElementById('editorArea').classList.add('hidden');
            }
        }

        function actualizarValoresUI() {
            document.getElementById('valTolerancia').innerText = document.getElementById('toleranceSlider').value;
            document.getElementById('valGrosor').innerText = document.getElementById('thicknessSlider').value;
        }

        async function procesarStencil() {
            if (!archivoOriginal) return;
            document.getElementById('btnProcesar').classList.add('hidden');
            document.getElementById('txtCargando').classList.remove('hidden');

            const tolerancia = document.getElementById('toleranceSlider').value;
            const grosor = document.getElementById('thicknessSlider').value;

            const formData = new FormData();
            formData.append('file', archivoOriginal);
            formData.append('tolerance', tolerancia);
            formData.append('thickness', grosor);

            try {
                const response = await fetch(URL_API, { method: 'POST', body: formData });
                if (!response.ok) throw new Error("Error en procesamiento");

                const blob = await response.blob();
                document.getElementById('imgStencil').src = URL.createObjectURL(blob);
                document.getElementById('editorArea').classList.remove('hidden');
                cambiarColor(colorActual);
            } catch (error) {
                alert("Error de comunicación. Asegúrate de haber subido el nuevo código a Render o dale 30 segundos si el servidor se estaba reactivando.");
                document.getElementById('btnProcesar').classList.remove('hidden');
            } finally {
                document.getElementById('txtCargando').classList.add('hidden');
            }
        }

        function cambiarOpacidad(valor) {
            document.getElementById('imgOriginal').style.opacity = valor / 100;
        }

        function cambiarColor(color) {
            colorActual = color;
            const tint = document.getElementById('tintLayer');
            if (color === 'black') {
                tint.style.display = 'none';
            } else {
                tint.style.display = 'block';
                if (color === 'red') tint.style.backgroundColor = 'rgb(220, 38, 38)';
                if (color === 'blue') tint.style.backgroundColor = 'rgb(37, 99, 235)';
                if (color === 'green') tint.style.backgroundColor = 'rgb(34, 197, 94)';
            }
        }

        function descargarJPG() {
            const img = document.getElementById('imgStencil');
            if (!img.src) return;

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const tempImg = new Image();
            tempImg.src = img.src;
            
            tempImg.onload = function() {
                canvas.width = tempImg.naturalWidth;
                canvas.height = tempImg.naturalHeight;
                
                // Pintamos fondo blanco puro de soporte para JPG
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(tempImg, 0, 0);

                // Procesamiento por píxel de alta fidelidad para conservar el color al descargar
                if (colorActual !== 'black') {
                    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imgData.data;
                    
                    let r = 0, g = 0, b = 0;
                    if (colorActual === 'red') { r = 220; g = 38; b = 38; }
                    if (colorActual === 'blue') { r = 37; g = 99; b = 235; }
                    if (colorActual === 'green') { r = 34; g = 197; b = 94; }

                    // Reemplaza píxeles oscuros (líneas maestras) por el color seleccionado
                    for (let i = 0; i < data.length; i += 4) {
                        if (data[i] < 140 && data[i+1] < 140 && data[i+2] < 140) {
                            data[i] = r;
                            data[i+1] = g;
                            data[i+2] = b;
                        }
                    }
                    ctx.putImageData(imgData, 0, 0);
                }

                const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
                const enlace = document.createElement('a');
                enlace.href = dataUrl;
                enlace.download = `stencil-${colorActual}-estilografo.jpg`;
                document.body.appendChild(enlace);
                enlace.click();
                document.body.removeChild(enlace);
            };
        }
    </script>
</body>
</html>
