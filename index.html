<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tattoo LineArt Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .image-container { position: relative; width: 100%; max-width: 500px; height: 500px; background-color: white; }
        .image-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; z-index: 10; }
        
        /* Capa de fusión profesional para tintar únicamente las líneas suaves */
        #tintLayer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            mix-blend-mode: screen; pointer-events: none; display: none; z-index: 15; 
        }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-xl bg-gray-900 p-6 rounded-2xl shadow-2xl text-center border border-gray-800">
        <h1 class="text-2xl font-black mb-1 text-yellow-400 uppercase tracking-wider">Tattoo LineArt Studio</h1>
        <p class="text-gray-500 text-xs mb-6">Filtro de Contornos Suavizados Anti-Pixelado</p>

        <div class="mb-6">
            <label class="block w-full border-2 border-dashed border-gray-700 hover:border-yellow-500 rounded-xl p-6 cursor-pointer transition bg-gray-950">
                <span class="text-sm text-gray-400 block mb-1">Cargar imagen o captura de pantalla</span>
                <span class="text-xs text-gray-600">Soporta formatos JPG, PNG y capturas</span>
                <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="cargarImagen(event)">
            </label>
        </div>

        <div id="toleranceControl" class="mb-6 bg-gray-950 p-4 rounded-xl border border-gray-800 hidden">
            <div class="flex justify-between text-xs font-bold text-gray-400 mb-2">
                <span>TRAZO FINO (0.2mm)</span>
                <span>PRESIÓN DEL PINCEL: <span id="valTolerancia">2</span></span>
                <span>TRAZO FUERTE (0.8mm)</span>
            </div>
            <input type="range" id="toleranceSlider" min="1" max="4" step="1" value="2" onchange="actualizarAjustes()" class="w-full h-2 bg-gray-800 rounded-lg appearance-none cursor-pointer">
        </div>

        <button id="btnProcesar" onclick="procesarStencil()" class="w-full bg-yellow-500 hover:bg-yellow-600 text-gray-950 font-bold py-3 px-6 rounded-xl transition hidden shadow-lg">
            Generar Lineart Limpio 🖋️
        </button>

        <p id="txtCargando" class="text-yellow-400 text-sm font-medium hidden animate-pulse py-2">Dibujando contornos vectoriales sin pixelado...</p>

        <div id="editorArea" class="mt-6 hidden text-left">
            <div class="mb-4 text-center">
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Color de la Tinta</label>
                <div class="flex gap-4 justify-center">
                    <button onclick="cambiarColor('black')" class="w-8 h-8 rounded-full bg-black border-2 border-white cursor-pointer shadow"></button>
                    <button onclick="cambiarColor('red')" class="w-8 h-8 rounded-full bg-red-600 border border-transparent cursor-pointer shadow"></button>
                    <button onclick="cambiarColor('blue')" class="w-8 h-8 rounded-full bg-blue-600 border border-transparent cursor-pointer shadow"></button>
                    <button onclick="cambiarColor('green')" class="w-8 h-8 rounded-full bg-green-500 border border-transparent cursor-pointer shadow"></button>
                </div>
            </div>

            <div class="image-container mx-auto border border-gray-800 rounded-xl overflow-hidden shadow-inner">
                <img id="imgStencil" class="image-layer" alt="Lineart Suave">
                <div id="tintLayer"></div>
                <img id="imgOriginal" class="image-layer" alt="Original" style="z-index: 20; opacity: 0;">
            </div>

            <div class="mt-4 bg-gray-950 p-3 rounded-lg border border-gray-800">
                <label class="block text-xs text-gray-400 mb-1 font-medium">Comparar: Original vs Trazado</label>
                <input type="range" id="opacitySlider" min="0" max="100" value="0" oninput="cambiarOpacidad(this.value)" class="w-full h-1 bg-gray-800 rounded-lg appearance-none cursor-pointer">
            </div>

            <button onclick="descargarJPG()" class="mt-4 w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-6 rounded-xl transition shadow-lg">
                Descargar Plantilla Limpia (JPG)
            </button>
        </div>
    </div>

    <script>
        const URL_API = "https://stencil-backend-youx.onrender.com/generate-stencil/";
        let archivoOriginal = null;
        let colorActual = 'black';

        function cargarImagen(event) {
            const file = event.target.files[0];
            if (file) {
                archivoOriginal = file;
                document.getElementById('imgOriginal').src = URL.createObjectURL(file);
                document.getElementById('btnProcesar').classList.remove('hidden');
                document.getElementById('toleranceControl').classList.remove('hidden');
                document.getElementById('editorArea').classList.add('hidden');
            }
        }

        function actualizarAjustes() {
            const val = document.getElementById('toleranceSlider').value;
            document.getElementById('valTolerancia').innerText = val;
            if(!document.getElementById('editorArea').classList.contains('hidden')) {
                procesarStencil();
            }
        }

        async function procesarStencil() {
            if (!archivoOriginal) return;
            document.getElementById('btnProcesar').classList.add('hidden');
            document.getElementById('txtCargando').classList.remove('hidden');

            const rangoTolerancia = document.getElementById('toleranceSlider').value;
            const formData = new FormData();
            formData.append('file', archivoOriginal);
            formData.append('tolerance', rangoTolerancia);

            try {
                const response = await fetch(URL_API, { method: 'POST', body: formData });
                if (!response.ok) throw new Error();

                const blob = await response.blob();
                document.getElementById('imgStencil').src = URL.createObjectURL(blob);
                document.getElementById('editorArea').classList.remove('hidden');
                cambiarColor(colorActual);
            } catch (error) {
                alert("El servidor se está reiniciando con las mejoras de estabilidad. Espera 10 segundos e intenta de nuevo.");
                document.getElementById('btnProcesar').classList.remove('hidden');
            } finally {
                document.getElementById('txtCargando').classList.add('hidden');
            }
        }

        function cambiarOpacidad(valor) {
            document.getElementById('imgOriginal').style.opacity = valor / 100;
        }

        function cambiarColor(color) {
            colorActual = color;
            const tint = document.getElementById('tintLayer');
            if (color === 'black') {
                tint.style.display = 'none';
            } else {
                tint.style.display = 'block';
                if (color === 'red') tint.style.backgroundColor = 'rgb(239, 68, 68)';
                if (color === 'blue') tint.style.backgroundColor = 'rgb(59, 130, 246)';
                if (color === 'green') tint.style.backgroundColor = 'rgb(34, 197, 94)';
            }
        }

        function descargarJPG() {
            const img = document.getElementById('imgStencil');
            if (!img.src) return;

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const tempImg = new Image();
            tempImg.src = img.src;
            tempImg.onload = function() {
                canvas.width = tempImg.naturalWidth;
                canvas.height = tempImg.naturalHeight;
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(tempImg, 0, 0);

                if (colorActual !== 'black') {
                    ctx.save();
                    ctx.globalCompositeOperation = 'source-atop';
                    if (colorActual === 'red') ctx.fillStyle = 'rgb(239, 68, 68)';
                    if (colorActual === 'blue') ctx.fillStyle = 'rgb(59, 130, 246)';
                    if (colorActual === 'green') ctx.fillStyle = 'rgb(34, 197, 94)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.restore();
                }

                const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
                const enlace = document.createElement('a');
                enlace.href = dataUrl;
                enlace.download = 'lineart-estilografo.jpg';
                document.body.appendChild(enlace);
                enlace.click();
                document.body.removeChild(enlace);
            };
        }
    </script>
</body>
</html>
